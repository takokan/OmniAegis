services:
  - type: web
    name: omniaegis-decision-layer
    runtime: docker
    dockerContext: ./decision_layer
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: SKIP_STARTUP_DEPENDENCY_CHECK
        value: "1"
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "8000"
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GRAFANA_PROMETHEUS_URL
        sync: false
      - key: GRAFANA_API_KEY
        sync: false
      - key: PINATA_API_KEY
        sync: false
      - key: WEB3_PROVIDER_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        sync: false
      - key: FIRESTORE_USERS_COLLECTION
        value: "users"
      - key: AUTH_ADMIN_EMAIL
        sync: false

  - type: web
    name: omniaegis-analysis-engine
    runtime: docker
    dockerContext: ./analysis_engine
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8090"
      - key: REDIS_URL
        sync: false
      - key: ANALYSIS_ENGINE_PORT
        value: "8090"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
